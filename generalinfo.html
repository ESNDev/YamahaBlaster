<!DOCTYPE html>
<html>
<head>
  <title>PDF Viewer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    canvas {
      display: block;
      margin: auto;
    }
  </style>
</head>

<body>
  <canvas id="pdf-canvas"></canvas>

  <!-- PDF.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.js"></script>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.worker.min.js';

    const url = 'yamaha_blaster_1988_service_manual.pdf';

    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');

    pdfjsLib.getDocument(url).promise.then(pdf => {
      pdf.getPage(1).then(page => {

        const viewport = page.getViewport({ scale: 1 });

        // 95% of screen width/height
        const scaleX = (window.innerWidth * 0.95) / viewport.width;
        const scaleY = (window.innerHeight * 0.95) / viewport.height;

        const scale = Math.min(scaleX, scaleY);

        const scaledViewport = page.getViewport({ scale });

        canvas.width = scaledViewport.width;
        canvas.height = scaledViewport.height;

        page.render({
          canvasContext: ctx,
          viewport: scaledViewport
        });
      });
    });
  </script>
</body>
</html>
