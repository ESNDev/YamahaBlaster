<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Yamaha Blaster Manual</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

<body>

  <canvas id="pdf-canvas"></canvas>

  <script type="module">

    import * as pdfjsLib from 'https://unpkg.com/pdfjs-dist@4.3.136/build/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://unpkg.com/pdfjs-dist@4.3.136/build/pdf.worker.min.mjs';

    const url = 'yamaha_blaster_1988_service_manual.pdf';

    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');

    async function renderPDF() {

      // Load PDF
      const pdf = await pdfjsLib.getDocument(url).promise;

      // Get first page
      const page = await pdf.getPage(1);

      // Base viewport
      const viewport = page.getViewport({ scale: 1 });

      // Fit to 95% of screen
      const scaleX = (window.innerWidth * 0.95) / viewport.width;
      const scaleY = (window.innerHeight * 0.95) / viewport.height;

      const scale = Math.min(scaleX, scaleY);

      const scaledViewport = page.getViewport({ scale });

      // Resize canvas
      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;

      // Render page
      await page.render({
        canvasContext: ctx,
        viewport: scaledViewport
      }).promise;
    }

    renderPDF();

  </script>

</body>

</html>
